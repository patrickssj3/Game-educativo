<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>TrashDash - Hall da Fama</title>
    <style>
        body {
            background-color: #1e3a29;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            margin: 0;
        }
        .ranking-container {
            background-color: #2a5a3f;
            width: 600px;
            padding: 30px;
            border-radius: 15px;
            border: 4px solid #fbbf24;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { color: #fbbf24; font-size: 36px; margin-bottom: 10px; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 15px;
            border-bottom: 1px solid #4ade80;
            font-size: 20px;
        }
        th { background-color: #111; color: #4ade80; }
        .top-1 { color: #fbbf24; font-weight: bold; font-size: 24px; } /* Ouro */
        .top-2 { color: #94a3b8; font-weight: bold; font-size: 22px; } /* Prata */
        .top-3 { color: #b45309; font-weight: bold; font-size: 22px; } /* Bronze */
        .btn-voltar {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            background-color: #4ade80;
            color: #111;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.2s;
        }
        .btn-voltar:hover { background-color: #22c55e; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="ranking-container">
        <h1>🏆 Hall da Fama 🏆</h1>
        <p>Os maiores recicladores do TrashDash!</p>

        <table>
            <thead>
                <tr>
                    <th>Posição</th>
                    <th>Herói</th>
                    <th>Pontos</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo">
                <tr><td colspan="3">Carregando dados do servidor... ⏳</td></tr>
            </tbody>
        </table>

        <a href="TrashDash.html" class="btn-voltar">&larr; Voltar para o Jogo</a>
    </div>

    <script src="./js/ranking.js"></script>
</body>
</html>
